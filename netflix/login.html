/* background glow */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#ff004455,transparent 70%);
    top:-150px;
    left:-100px;
    filter:blur(60px);
    animation:moveGlow 8s linear infinite alternate;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:radial-gradient(circle,#00aaff55,transparent 70%);
    bottom:-150px;
    right:-100px;
    filter:blur(60px);
    animation:moveGlow2 8s linear infinite alternate;
}

@keyframes moveGlow{
    from{transform:translate(0,0);}
    to{transform:translate(120px,80px);}
}

@keyframes moveGlow2{
    from{transform:translate(0,0);}
    to{transform:translate(-120px,-80px);}
}

/* CARD */
.container{
    position:relative;
    width:380px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 20px 40px rgba(0,0,0,.5);
    z-index:10;
}

.container:hover{
    transform:translateY(-5px);
    transition:.4s;
}

h2{
    text-align:center;
    color:#fff;
    margin-bottom:30px;
    font-size:32px;
    letter-spacing:1px;
}

/* INPUT */
.input-box{
    position:relative;
    margin-bottom:28px;
}

.input-box input{
    width:100%;
    padding:14px 12px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    outline:none;
    border-radius:10px;
    color:white;
    font-size:15px;
    transition:.3s;
}

.input-box input:focus{
    border-color:#ff004c;
    box-shadow:0 0 12px #ff004c66;
}

.input-box label{
    position:absolute;
    left:12px;
    top:14px;
    color:#aaa;
    pointer-events:none;
    transition:.3s;
    background:transparent;
}

.input-box input:focus~label,
.input-box input:valid~label{
    top:-10px;
    left:10px;
    font-size:12px;
    color:#00bfff;
    background:#111122;
    padding:0 5px;
}

/* OPTIONS */
.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    font-size:14px;
    color:#ddd;
}

.options a{
    color:#00bfff;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#ff004c,#ff3300);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
    position:relative;
}

button:hover{
    box-shadow:0 0 20px #ff004c;
}

/* RUN BUTTON */
.run{
    transition:transform .2s;
}

/* FOOT TEXT */
.bottom{
    margin-top:22px;
    text-align:center;
    color:#bbb;
    font-size:14px;
}

.bottom a{
    color:#00bfff;
    text-decoration:none;
}

.bottom a:hover{
    text-decoration:underline;
}

/* SUCCESS */
#msg{
    text-align:center;
    margin-top:15px;
    color:#00ff88;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<form id="loginForm">

<h2>Welcome Back</h2>

<div class="input-box">
<input type="email" required>
<label>Email Address</label>
</div>

<div class="input-box">
<input type="password" required>
<label>Password</label>
</div>

<div class="options">
<label><input type="checkbox"> Remember</label>
<a href="#">Forgot?</a>
</div>

<button type="submit" id="loginBtn" class="run">
Login Now
</button>

<p id="msg"></p>

<div class="bottom">
New user? <a href="#">Create Account</a>
</div>

</form>
</div>

<script>
const btn = document.getElementById("loginBtn");
const form = document.getElementById("loginForm");
const msg = document.getElementById("msg");

/* button bhagega hover pe */
btn.addEventListener("mouseenter", () => {

let x = Math.random() * 220 - 110;
let y = Math.random() * 140 - 70;

btn.style.transform = `translate(${x}px,${y}px) rotate(${Math.random()*10-5}deg)`;

});

/* click hone pe pakad sakta hai after 5 hover */
let count = 0;

btn.addEventListener("mouseenter", ()=>{
count++;

if(count > 5){
btn.style.transform = "translate(0,0)";
btn.innerText = "Okay Click Me 😅";
}
});

form.addEventListener("submit",(e)=>{
e.preventDefault();
msg.innerText = "Login Successful ✅";
btn.innerText = "Welcome 🎉";
btn.style.background = "linear-gradient(90deg,#00c853,#00e676)";
btn.style.transform = "translate(0,0)";
});
</script>

</body>
</html>
